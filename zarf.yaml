---
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: distro-rke2
  version: "###ZARF_PKG_TMPL_VERSION###"
  source: https://github.com/colonel-byte/zarf-pkg-rke2
  annotations:
    org.opencontainers.image.source: "https://github.com/colonel-byte/zarf-pkg-rke2"
    org.opencontainers.image.description: Zarf package for deploying rke2
variables:
  - name: RKE2_ARGS
    description: Arguments to pass to rke2
    default: ""
components:
  - name: install-engine
    required: true
    only:
      flavor: binary
    import:
      path: install/binary

  - name: install-server
    required: false
    only:
      flavor: binary
    import:
      path: install/binary

  - name: install-agent
    required: false
    only:
      flavor: binary
    import:
      path: install/binary

  - name: install-engine
    required: true
    only:
      flavor: rpm
    import:
      path: install/rpm

  - name: install-server
    required: false
    only:
      flavor: rpm
    import:
      path: install/rpm

  - name: install-agent
    required: false
    only:
      flavor: rpm
    import:
      path: install/rpm

  - name: populate-core-images
    required: true
    import:
      name: images
      path: images/base

  - name: populate-cni-cilium-images
    required: false
    import:
      name: images
      path: images/cni-cilium

  - name: populate-cni-multus-images
    required: false
    import:
      name: images
      path: images/cni-multus
