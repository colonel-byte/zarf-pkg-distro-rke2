              echo https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-server-$(echo ###ZARF_PKG_TMPL_RKE2_VERSION### | sed 's#^v##g; s#+#~#g')-0.el9.x86_64.rpm
              curl -L -o ./target/rke2-server.rpm https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-server-$(echo ###ZARF_PKG_TMPL_RKE2_VERSION### | sed 's#^v##g; s#+#~#g')-0.el9.x86_64.rpm
      onDeploy:
        defaults:
          maxRetries: 5
        before:
          - cmd: |-
              if [ "$(uname -m)" != "x86_64" ]; then echo "this package architecture is amd64, but the target system has a different architecture. These architectures must be the same" && exit 1; fi
            description: Check that the host architecture matches the package architecture
            maxRetries: 0
          - cmd: ./zarf internal is-valid-hostname
            description: Check if the current system has a, RFC1123 compliant hostname
            maxRetries: 0
        after:
          - description: install rke2 rpm
            cmd: |-
              dnf install -y /var/lib/rancher/rke2/rpm/rke2-server.rpm
  - name: install-server
    required: true
    files:
      - source: target/rke2-server.rpm
        target: /var/lib/rancher/rke2/rpm/rke2-server.rpm
        shasum: "###ZARF_PKG_TMPL_RKE2_RPM_SERVER_SHA_ARM64###"
